# -----Server-----
server.port=8080
spring.application.name=nutrition

# -----hünsch formattiertes JSON-----
spring.jackson.serialization.indent-output=true

# -----H2 DB (in Datei speichern)-----
# jdbc:h2:mem = DB lebt nur im RAM, beim Neustart weg
spring.datasource.url=jdbc:h2:file:./data/nutrition
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -----JPA / Hibernate-----
# ddl-auto=create-drop:Tabellen bei Start erstellen, bei Stopp löschen (f. Entwicklung)
# Produtkion: validate oder none
spring.jpa.hibernate.ddl-auto=update

# -----SQL-Dialekt für H2-----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# -----SQL-Statements in der Konsole anzeigen
spring.jpa.show-sql=true

# ---- H2 Web-Konsole (optional, zum Debuggen) ----
# Erreichbar unter http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:nutrition
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Open Food Facts API ----
openfoodfacts.api.base-url=https://world.openfoodfacts.org/
openfoodfacts.api.connect-timeout-ms=5000
openfoodfacts.api.read-timeout-ms=5000

