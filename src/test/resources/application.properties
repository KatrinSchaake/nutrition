# Tests nutzen eine eigene In-Memory-DB, unabhängig von der Datei-DB der Entwicklung
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop

# Open Food Facts: im Test nicht echt aufgerufen, aber die Config braucht die Werte
openfoodfacts.api.base-url=https://world.openfoodfacts.org/
openfoodfacts.api.connect-timeout-ms=5000
openfoodfacts.api.read-timeout-ms=5000